<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

        <div class="mid">

    <script>
        function redirectToLoginPage() {
            
            window.location.href = "signup/login.html";

        function redirectToSignupPage() {
