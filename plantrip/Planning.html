<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan a new Trip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="Planning.css">
</head>
<body>
    <div class="container">
        <div class="trip">
            <h1>Plan a new Trip</h1>
        </div>
    </div>
    <div class="search">
        <input type="text" name="search" id="search" placeholder="Where to?">
    </div>
    <div class="message">
        <h5>Choose a destination to start planning</h5>
    </div>
    <div class="date">
        <input type="text" name="user_id" id="user_id">
        <input type="text" name="start_date" id="start_date" placeholder="Start Date">
        <input type="text" name="end_date" id="end_date" placeholder="End Date">
        <input type="text" name="description" id="description" placeholder="Description">
    </div>
    <div class="btn">
        <button onclick="submitForm()">Start Planning</button>
    </div>
    
    <script>
       function submitForm() {
            const user_id = 11;  
            const start_date = document.getElementById('start_date').value;
            const end_date = document.getElementById('end_date').value;
            const description = document.getElementById('description').value;
            
            console.log('Form data:', { user_id, start_date, end_date, description });  
            
           
            const formData = new FormData();
            formData.append('user_id', user_id);
            formData.append('start_date', start_date);
            formData.append('end_date', end_date);
            formData.append('description', description);
            
             
            fetch('http://localhost:3000/submit', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                   
                    alert('Trip created successfully!');
                } else {
                     
                    alert('Error creating trip. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error creating trip. Please try again.');
            });
        }
    </script>
</body>
</html>
